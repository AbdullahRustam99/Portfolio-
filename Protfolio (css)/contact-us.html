<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="logo">
          <img
            src="./img/LOGO-removebg-preview.png"
            alt="logo"
            width="100"
            height="10"
          />
        </div>
        <div class="nav-links">
          <a href="./index.html" class="active">Home</a>
          <a href="./About.html">About</a>
          <a href="./Project.html">Projects</a>
          <a href="./Service.html">Services</a>
          <a href="./contact-us.html">Contact Us</a>
        </div>
      </nav>
    </header>

    <div class="centered-section">
      <h2 class="section-title">Contact</h2>
      <p class="section-content">Home - Contact</p>
    </div>

    <div class="contact-section">
      <div class="contact-info">
        <div class="contact-item">
          <img src="./img/Email.jpg" alt="Email Icon" width="20" />
          <div>
            <p class="contact-detail">abdullahrustam12345@gmail.com</p>
            <p class="contact-note">Send us your query anytime!</p>
          </div>
        </div>
        <div class="contact-item">
          <img src="./img/Cal.jpg" alt="Call Icon" />
          <div>
            <p class="contact-detail">0032320003230</p>
            <p class="contact-note">Mon to Fri 9am to 6 pm</p>
          </div>
        </div>
        <div class="contact-item">
          <img src="./img/Home.jpg" alt="Location Icon" />
          <div>
            <p class="contact-detail">Karachi</p>
            <p class="contact-note">Pakistan</p>
          </div>
        </div>
      </div>

      <div class="contact-form">
        <input type="text" class="input-field" placeholder="Name" />
        <input type="text" class="input-field" placeholder="Email" />
        <input type="text" class="input-field" placeholder="Subject" />
        <input type="text" class="input-field" placeholder="Message" />
        <button class="send-button">Send Message</button>
      </div>
    </div>
    <footer class="footer">
      <footer class="footer">
        <div class="footer-logo">
          <img
            src="./img/LOGO-removebg-preview.png"
            alt="logo"
            width="300"
            height="10"
          />
        </div>

        <div class="footer-links">
          <a href="./index.html" class="active">Home</a>
          <a href="./About.html">About</a>
          <a href="./Project.html">Projects</a>
          <a href="./Service.html">Services</a>
          <a href="./contact-us.html">Contact Us</a>
        </div>
        <div class="footer-copyright">
          &copy; 2024 All rights reserved | This is made by ABDULLAH RUSTAM
        </div>
      </footer>
    </footer>
